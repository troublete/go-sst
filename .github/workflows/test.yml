name: test

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  test:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: setup go
      uses: actions/setup-go@v4
      with:
        go-version: '1.24.7'

    - name: test
      run: go test -v ./...
